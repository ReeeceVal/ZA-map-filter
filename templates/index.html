<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SA Region Filter Builder</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div id="app">

    <!-- Top bar -->
    <div id="search-bar">
      <div id="app-logo">ZA <span id="app-logo-mark">◈</span></div>
      <div id="search-wrapper">
        <svg id="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/>
        </svg>
        <input type="text" id="search-input"
               placeholder="Search provinces, districts, municipalities, wards…"
               autocomplete="off" spellcheck="false" />
      </div>
      <div id="search-results" class="hidden"></div>
    </div>

    <!-- Three-panel row -->
    <div id="panel-row">

      <!-- Filter output panel (left) -->
      <div id="sql-panel">
        <div class="panel-header">
          <div class="panel-header-accent energy"></div>
          <span class="panel-title">Filter Output</span>
          <button id="copy-btn">Copy ↗</button>
        </div>
        <div id="lang-tabs">
          <button class="lang-pill active" data-lang="sql">SQL</button>
          <button class="lang-pill" data-lang="pandas">Pandas</button>
          <button class="lang-pill" data-lang="pyspark">PySpark</button>
          <button class="lang-pill" data-lang="r">R</button>
        </div>
        <label id="df-name-wrap" class="hidden">
          <span id="df-name-label">var</span>
          <input id="df-name-input" type="text" spellcheck="false" autocomplete="off" />
        </label>
        <pre id="sql-output">-- No features selected</pre>
      </div>

      <div class="resize-handle" id="resize-left"></div>

      <!-- Map -->
      <div id="map-container">
        <div id="map"></div>
        <!-- Point layer toggles — hidden until layers are discovered -->
        <div id="point-layers-panel" style="display:none"></div>
        <div id="level-buttons">
          <button class="level-btn" data-level="adm1">Province</button>
          <button class="level-btn active" data-level="adm2">District</button>
          <button class="level-btn" data-level="adm3">Municipality</button>
          <button class="level-btn" data-level="adm4">Ward</button>
        </div>
      </div>

      <div class="resize-handle" id="resize-right"></div>

      <!-- Selection panel (right) -->
      <div id="sel-panel">
        <div class="panel-header">
          <div class="panel-header-accent potential"></div>
          <span class="panel-title">Selected <span id="sel-count"></span></span>
          <button id="clear-btn">Clear All</button>
        </div>
        <div id="sel-list">
          <div class="sel-empty">Click map features to add regions to query</div>
        </div>
      </div>

    </div><!-- /panel-row -->
  </div><!-- /app -->

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/js/config.js"></script>
  <script src="/static/js/state.js"></script>
  <script src="/static/js/panels.js"></script>
  <script src="/static/js/map.js"></script>
  <script src="/static/js/search.js"></script>
  <script src="/static/js/resize.js"></script>
  <script src="/static/js/layers.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      MapManager.init();
      Panels.init();
      Search.init();
      Resize.init();
      LayerManager.init(MapManager.getMap());
    });
  </script>
</body>
</html>
